name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    env:
      # Vars mínimas para que env.js no falle al importar (los tests no conectan a Mongo).
      MONGODB_URI: mongodb://localhost/test
      JWT_SECRET: test-secret-ci
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Syntax check (todos los .js de src)
        run: |
          for f in $(find src -name '*.js'); do node --check "$f"; done

      - name: Tests
        run: npm test
